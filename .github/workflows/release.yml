name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - name: Build
        run: cargo build --release --locked
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/portal-hub dist/portal-hub-linux-x86_64
          tar -C dist -czf portal-hub-linux-x86_64.tar.gz portal-hub-linux-x86_64
      - uses: softprops/action-gh-release@v2
        with:
          files: portal-hub-linux-x86_64.tar.gz
